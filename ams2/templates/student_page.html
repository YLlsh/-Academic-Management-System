<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EduManage - Student Dashboard</title>
<link rel="stylesheet" href="style.css">
<style>
    body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#f4f6f9;
}

/* Navbar */

.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
    background:#2c3e50;
    color:white;
}

.logo{
    font-size:22px;
    font-weight:bold;
    color:#6fa8ff;
}

.nav-links{
    list-style:none;
    display:flex;
    gap:25px;
}

.nav-links a{
    text-decoration:none;
    color:white;
    font-size:15px;
}

.nav-links a:hover{
    color:#6fa8ff;
}

.logout-btn{
    background:#4a90e2;
    border:none;
    padding:8px 16px;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

/* Main */

.container{
    width:80%;
    margin:40px auto;
}

h1{
    margin-bottom:20px;
}

/* Cards */

.card{
    background:white;
    padding:25px;
    border-radius:10px;
    margin-bottom:25px;
    box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

/* Class Box */

.class-box{
    background:#eef3ff;
    padding:15px;
    border-radius:8px;
    margin-top:10px;
}
</style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar">
    <div class="logo">EduManage</div>

    <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">My Classes</a></li>
        <li><a href="#">Attendance</a></li>
        <li><a href="#">Profile</a></li>
    </ul>

    <button class="logout-btn">Logout</button>
</nav>


<!-- Main Container -->
<div class="container">

    <h1>Welcome Student 👋</h1>

    <!-- Date Card -->
    <div class="card">
        <h2>Today's Date</h2>
        <p id="todayDate"></p>
    </div>

    <!-- Tomorrow Class -->
    <div class="card">
        <h2>Tomorrow's Classes</h2>

        <div class="class-box">
            <h3>Mathematics</h3>
            <p>Time : 10:00 AM - 11:00 AM</p>
            <p>Teacher : Mr. Sharma</p>
        </div>

        <div class="class-box">
            <h3>Science</h3>
            <p>Time : 12:00 PM - 01:00 PM</p>
            <p>Teacher : Mrs. Patel</p>
        </div>

    </div>

</div>


<script src="script.js"></script>
<script>
    const today = new Date();

const options = {
    weekday: 'long',
    year: 'numeric',
    month: 'long',
    day: 'numeric'
};

document.getElementById("todayDate").innerText =
today.toLocaleDateString("en-IN", options);
</script>

</body>
</html>
