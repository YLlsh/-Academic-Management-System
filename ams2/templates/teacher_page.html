<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EduManage - Teacher Dashboard</title>
<link rel="stylesheet" href="teacher.css">
<style>
    body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

/* Navbar */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:#2c3e50;
color:white;
}

.logo{
font-size:22px;
font-weight:bold;
color:#6fa8ff;
}

.nav-links{
list-style:none;
display:flex;
gap:25px;
}

.nav-links a{
text-decoration:none;
color:white;
}

.nav-links a:hover{
color:#6fa8ff;
}

.logout-btn{
background:#4a90e2;
border:none;
padding:8px 16px;
color:white;
border-radius:6px;
cursor:pointer;
}


/* Container */

.container{
width:80%;
margin:40px auto;
}


/* Cards */

.card{
background:white;
padding:25px;
border-radius:10px;
margin-bottom:25px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}


/* Class Box */

.class-box{
background:#eef3ff;
padding:15px;
border-radius:8px;
margin-top:10px;
}


/* Quick Actions */

.actions{
display:flex;
gap:15px;
margin-top:10px;
}

.actions button{
background:#4a90e2;
border:none;
color:white;
padding:10px 18px;
border-radius:6px;
cursor:pointer;
}

.actions button:hover{
background:#357bd8;
}
</style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar">

<div class="logo">EduManage</div>

<ul class="nav-links">
<li><a href="#">Home</a></li>
<li><a href="#">My Classes</a></li>
<li><a href="#">Assignments</a></li>
<li><a href="#">Students</a></li>
<li><a href="#">Profile</a></li>
</ul>

<button class="logout-btn">Logout</button>

</nav>


<!-- Main Content -->
<div class="container">

<h1>Welcome Teacher 👋</h1>

<!-- Date Card -->
<div class="card">
<h2>Today's Date</h2>
<p id="todayDate"></p>
</div>


<!-- Tomorrow Schedule -->
<div class="card">

<h2>Tomorrow's Classes</h2>

<div class="class-box">
<h3>Mathematics - Class 10A</h3>
<p>Time : 09:00 AM - 10:00 AM</p>
<p>Room : 204</p>
</div>

<div class="class-box">
<h3>Physics - Class 11B</h3>
<p>Time : 11:00 AM - 12:00 PM</p>
<p>Room : 301</p>
</div>

</div>


<!-- Quick Actions -->
<div class="card">

<h2>Quick Actions</h2>

<div class="actions">

<button>Take Attendance</button>
<button>Add Assignment</button>
<button>View Students</button>

</div>

</div>


</div>

<script src="teacher.js"></script>
<script>

    const today = new Date();

const options = {
weekday: 'long',
year: 'numeric',
month: 'long',
day: 'numeric'
};

document.getElementById("todayDate").innerText =
today.toLocaleDateString("en-IN", options);
</script>

</body>
</html>
