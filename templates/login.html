{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Academic Management System</title>
    <link rel="stylesheet" href="{% static 'assets/css/style.css' %}">
</head>
<body>
    <!-- Login Page -->
    <div class="login-page">
        <div class="login-container">
            <div class="login-content">
                <div class="login-header">
                    <div class="login-role-icon" id="login-role-icon">👤</div>
                    <h1 id="login-role-title">Login</h1>
                    <p id="login-role-subtitle">Please enter your credentials to continue</p>
                </div>
                <form class="login-form" id="login-form" method="post" action="">
                    {% csrf_token %}
                    <div class="form-group">
                        <label for="username">Username / Email</label>
                        <input type="text" id="username" name="username" placeholder="Enter your username or email" required autofocus>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    </div>
                    <div class="form-group checkbox-group">
                        <label>
                            <input type="checkbox" id="remember-me" name="remember-me">
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-password">Forgot Password?</a>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary btn-block">Login</button>
                        <button type="button" class="btn btn-secondary btn-block" id="back-to-role-btn">Back to Role Selection</button>
                    </div>
                    <div class="login-demo-info" id="login-demo-info">
                        <p><strong>Demo Credentials:</strong></p>
                        <p id="demo-credentials"></p>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="{% static 'assets/js/login.js' %}"></script>
</body>
</html>
