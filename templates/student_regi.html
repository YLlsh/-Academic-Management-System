{% extends 'base.html' %}
{% load static %}
{% block content %}


    <div id="page-student-registration" class="page-content active">
        <div class="page-header">
            <h1>Student Registration</h1>
            <p>Register new students to the academic system</p>
        </div>

        <div class="registration-content">
            <form class="registration-form" id="registration-form" method="post" action="">
                {% csrf_token %}

                <div class="form-row">
                    <div class="form-group">
                        <label for="student-id">Student ID *</label>
                        <input type="text"  id="studentID"  name="student_id" placeholder="Enter Student ID"  readonly>
                    </div>

                    <div class="form-group">
                        <label for="full-name">Full Name *</label>
                        <input type="text" id="full-name" name="full_name" placeholder="Enter Full Name" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="reg-email">Email Address *</label>
                        <input type="email" id="reg-email" name="email" placeholder="student@example.com" required>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number *</label>
                        <input type="tel" id="phone" name="phone" placeholder="+91 7123456789" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="date-of-birth">Date of Birth *</label>
                        <input type="date" id="date-of-birth" name="date_of_birth" required>
                    </div>

                    <div class="form-group">
                        <label for="gender">Gender *</label>
                        <select id="gender" name="gender" required>
                            <option value="">Select Gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="course">Course/Program *</label>
                        <select id="course" name="course" required>
                            <option value="">Select Course</option>
                            <option value="computer-science">Computer Science</option>
                            <option value="engineering">Engineering</option>
                            <option value="business">Business Administration</option>
                            <option value="medicine">Medicine</option>
                            <option value="arts">Arts & Humanities</option>
                            <option value="science">Natural Sciences</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="semester">Semester *</label>
                        <select id="semester" name="semester" required>
                            <option value="">Select Semester</option>
                            <option value="1">Semester 1</option>
                            <option value="2">Semester 2</option>
                            <option value="3">Semester 3</option>
                            <option value="4">Semester 4</option>
                            <option value="5">Semester 5</option>
                            <option value="6">Semester 6</option>
                            <option value="7">Semester 7</option>
                            <option value="8">Semester 8</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="address">Address *</label>
                    <textarea id="address" name="address" rows="3" placeholder="Enter full address" required></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="guardian-name">Guardian Name</label>
                        <input type="text" id="guardian-name" name="guardian_name" placeholder="Guardian's Full Name">
                    </div>

                    <div class="form-group">
                        <label for="guardian-phone">Guardian Phone</label>
                        <input type="tel" id="guardian-phone" name="guardian_phone"
                            placeholder="Guardian's Phone Number">
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Register Student</button>
                    <button type="reset" class="btn btn-secondary">Reset Form</button>
                </div>
            </form>
        </div>
    </div>

<!-- =============script for generate student id =============== -->
<script>
// Function to generate a random 8-digit student ID
function generateStudentID() {
    // Generate number between 10000000 and 99999999
    return Math.floor(10000000 + Math.random() * 90000000).toString();
}

// Function to create a unique student ID
function createUniqueStudentID() {
    let existingIDs = JSON.parse(localStorage.getItem('studentIDs')) || [];
    let newID;

    do {
        newID = generateStudentID();
        newID = `SDT${newID}`
    } while (existingIDs.includes(newID));

    existingIDs.push(newID);
    localStorage.setItem('studentIDs', JSON.stringify(existingIDs));
    return newID;
}

// Fetch input field
const studentInput = document.getElementById('studentID');

// Generate and fill the input when page loads
window.addEventListener('load', () => {
    studentInput.value = createUniqueStudentID();
});
</script>
<!-- =============END script for generate student id =============== -->

    {% endblock %}
